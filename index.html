<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harold's Personal Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="base-parent-nav">
        <nav>
            <div class="mid-parent-nav">
                <h2 class="logo">Harold</h2>
                <ul class="links">
                    <li>Home</li>
                    <li>About</li>
                    <li>Contact</li>
                </ul>
            </div>
        </nav>
    </div>

    <main class="base-parent-main">
        <div class="mid-parent-main">
            <div class="main-content">
                <h1 class="hero-main-text">
                    Hi, I am Harold
                </h1>
                <p class="hero-text">
                    I am a Go Developer
                </p>
                <a href="https://github.com/harrywvu/starter-stack-webinar-project" class="cta-button">View GitHub Repo</a>

        </div>

    <section class="skills-section">

            <div class="skills-grid">
                <div class="skill-category">
                    <h3>Languages</h3>
                    <div class="skill-badges">

                    <h3>Backend</h3>
                    <div class="skill-badges">
                        <span class="skill-badge">REST APIs</span>
                        <span class="skill-badge">Databases</span>

                    </div>
                </div>
                <div class="skill-category">
                    <h3>Tools</h3>
                    <div class="skill-badges">
                        <span class="skill-badge">Git</span>
                        <span class="skill-badge">Docker</span>
                        <span class="skill-badge">Linux</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Harold. Built with passion and Go.</p>
            <div class="footer-links">
                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>
                <a href="#">Email</a>

        </div>
    </footer>
